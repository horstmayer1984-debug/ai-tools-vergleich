// ─── Score Calculation ─────────────────────────────────────────────────────

function calcScores(answers) {
  const scores = { profi: 0, creator: 0, coder: 0, stratege: 0, automatisierer: 0, entdecker: 0 };
  answers.forEach((answerIdx, qIdx) => {
    if (answerIdx === null) return;
    const q = QUESTIONS[qIdx];
    const s = q.answers[answerIdx].scores;
    Object.entries(s).forEach(([k, v]) => { scores[k] += v; });
  });
  return scores;
}

function getWinner(scores) {
  const sorted = Object.entries(scores).sort(([, a], [, b]) => b - a);
  return sorted[0][0];
}

function QuizScreen({ onFinish }) {
  const [current, setCurrent] = useState(0);
  const [answers, setAnswers] = useState(Array(QUESTIONS.length).fill(null));
  const [selected, setSelected] = useState(null);

  const q = QUESTIONS[current];
  const progress = (current / QUESTIONS.length) * 100;

  function selectAnswer(idx) {
    setSelected(idx);
  }

  function next() {
    if (selected === null) return;
    const newAnswers = [...answers];
    newAnswers[current] = selected;
    setAnswers(newAnswers);

    if (current < QUESTIONS.length - 1) {
      setCurrent(current + 1);
      setSelected(newAnswers[current + 1] !== null ? newAnswers[current + 1] : null);
    } else {
      onFinish(newAnswers);
    }
  }

  function back() {
    if (current === 0) return;
    const newAnswers = [...answers];
    newAnswers[current] = selected;
    setAnswers(newAnswers);
    setCurrent(current - 1);
    setSelected(newAnswers[current - 1]);
  }

  const isLast = current === QUESTIONS.length - 1;

  return (
    <div className="question-section">
      <div className="progress-bar-wrapper">
        <div className="progress-bar-fill" style={{ width: `${progress}%` }} />
      </div>
      <div className="progress-label">Frage {current + 1} von {QUESTIONS.length}</div>

      <h2>{q.text}</h2>

      <div className="answers-grid">
        {q.answers.map((a, idx) => (
          <button
            key={idx}
            className={`answer-btn${selected === idx ? ' selected' : ''}`}
            onClick={() => selectAnswer(idx)}
          >
            <span className="answer-letter">{LETTERS[idx]}</span>
            <span className="answer-text">{a.text}</span>
          </button>
        ))}
      </div>

      <div className="question-nav">
        <button className="btn-secondary" onClick={back} disabled={current === 0}
          style={{ opacity: current === 0 ? 0.4 : 1, cursor: current === 0 ? 'default' : 'pointer' }}>
          ← Zurück
        </button>
        <button
          className="btn-primary"
          onClick={next}
          disabled={selected === null}
          style={{ opacity: selected === null ? 0.5 : 1, cursor: selected === null ? 'default' : 'pointer' }}
        >
          {isLast ? 'Ergebnis anzeigen →' : 'Weiter →'}
        </button>
      </div>
    </div>
  );
}

  function handleStart() { setScreen('quiz'); }

  return (
    <>
      <header className="site-header">

}
